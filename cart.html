<!DOCTYPE html>
<html>
<head>
    <title>Cart - HomeCraft</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- Navbar -->
<header class="navbar">
    <div class="logo">
        <img src="images/logo.png" width="30">
        <span>HomeCraft</span>
    </div>

    <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="#">Categories</a>
        <a href="cart.html">Cart</a>
    </nav>

    <div class="login-panel">
        <a href="login.html">👤 Login</a>
    </div>
</header>

<!-- CART WRAPPER -->
<div class="cart-wrapper">

    <!-- LEFT SIDE -->
    <div class="cart-left">

        <div class="cart-header">
            <h2>Cart (2 products)</h2>
            <span class="clear-cart">Clear cart</span>
        </div>

        <!-- ITEM 1 -->
        <div class="cart-item">

            <div class="item-left">
                <img src="images/chair.jpg">

                <div>
                    <b>Wooden Chair</b>
                    <p>Furniture</p>
                </div>
            </div>

            <div class="qty-box">
                <button class="minus">-</button>
                <span class="qty">1</span>
                <button class="plus">+</button>
            </div>

            <div class="item-price" data-price="2000">₹2000</div>

            <div class="remove-btn">✖</div>

        </div>

        <!-- ITEM 2 -->
        <div class="cart-item">

            <div class="item-left">
                <img src="images/frame.jpg">

                <div>
                    <b>Wall Frame Decor</b>
                    <p>Decor</p>
                </div>
            </div>

            <div class="qty-box">
                <button class="minus">-</button>
                <span class="qty">1</span>
                <button class="plus">+</button>
            </div>

            <div class="item-price" data-price="800">₹800</div>

            <div class="remove-btn">✖</div>

        </div>

    </div>

    <!-- RIGHT SIDE -->
    <div class="cart-right">

        <h3>Promo Code</h3>

        <div class="promo-box">
            <input type="text" placeholder="Type here...">
            <button>Apply</button>
        </div>

        <hr>

        <div class="summary-row">
            <span>Subtotal</span>
            <span id="subtotal">₹2800</span>
        </div>

        <div class="summary-row">
            <span>Discount</span>
            <span>₹0</span>
        </div>

        <div class="summary-row total">
            <b>Total</b>
            <b id="total">₹2800</b>
        </div>

        <button class="checkout-btn">Continue to checkout</button>

    </div>

</div>

<!-- ================= JAVASCRIPT ================= -->
<script>

const plusBtns = document.querySelectorAll(".plus");
const minusBtns = document.querySelectorAll(".minus");
const removeBtns = document.querySelectorAll(".remove-btn");
const subtotalEl = document.getElementById("subtotal");
const totalEl = document.getElementById("total");
const clearCartBtn = document.querySelector(".clear-cart");

// 🔥 Update Total
function updateTotal() {
    let total = 0;

    document.querySelectorAll(".cart-item").forEach(item => {
        const price = parseInt(item.querySelector(".item-price").dataset.price);
        const qty = parseInt(item.querySelector(".qty").innerText);

        total += price * qty;
    });

    subtotalEl.innerText = "₹" + total;
    totalEl.innerText = "₹" + total;
}

// ➕ PLUS
plusBtns.forEach(btn => {
    btn.addEventListener("click", () => {
        let qtyEl = btn.parentElement.querySelector(".qty");
        let qty = parseInt(qtyEl.innerText);
        qty++;
        qtyEl.innerText = qty;
        updateTotal();
    });
});

// ➖ MINUS
minusBtns.forEach(btn => {
    btn.addEventListener("click", () => {
        let qtyEl = btn.parentElement.querySelector(".qty");
        let qty = parseInt(qtyEl.innerText);

        if (qty > 1) {
            qty--;
            qtyEl.innerText = qty;
            updateTotal();
        }
    });
});

// ❌ REMOVE ITEM
removeBtns.forEach(btn => {
    btn.addEventListener("click", () => {
        btn.closest(".cart-item").remove();
        updateTotal();
    });
});

// 🧹 CLEAR CART
clearCartBtn.addEventListener("click", () => {
    document.querySelectorAll(".cart-item").forEach(item => item.remove());
    updateTotal();
});

// INITIAL LOAD
updateTotal();

</script>

</body>
</html>
