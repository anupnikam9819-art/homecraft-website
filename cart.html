<!DOCTYPE html>
<html>
<head>
    <title>Cart - HomeCraft</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- Navbar -->
<header class="navbar">
    <div class="logo">
        <img src="images/logo.png" width="30">
        <span>HomeCraft</span>
    </div>

    <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="#">Categories</a>
        <a href="cart.html">Cart (<span id="cart-count-nav">0</span>)</a>
        <a href="wishlist.html">Wishlist ❤️</a>
    </nav>

    <div class="login-panel">
        <a href="login.html">👤 Login</a>
    </div>
</header>

<!-- CART WRAPPER -->
<div class="cart-wrapper">

    <!-- LEFT SIDE -->
    <div class="cart-left">

        <div class="cart-header">
            <h2>Cart (<span id="cart-count">0</span> products)</h2>
            <span class="clear-cart">Clear cart</span>
        </div>

        <!-- 🔥 Dynamic items -->
        <div id="cart-container"></div>
        <p id="empty-msg" style="text-align:center; display:none;">
            Your cart is empty 🛒
        </p>

    </div>

    <!-- RIGHT SIDE -->
    <div class="cart-right">

        <h3>Promo Code</h3>

        <div class="promo-box">
            <input type="text" placeholder="Type here...">
            <button>Apply</button>
        </div>

        <hr>

        <div class="summary-row">
            <span>Subtotal</span>
            <span id="subtotal">₹0</span>
        </div>

        <div class="summary-row">
            <span>Discount</span>
            <span>₹0</span>
        </div>

        <div class="summary-row total">
            <b>Total</b>
            <b id="total">₹0</b>
        </div>

        <button class="checkout-btn" onclick="goToCheckout()">Continue to checkout</button>

    </div>

</div>

<!-- ================= JAVASCRIPT ================= -->
<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

const container = document.getElementById("cart-container");
const subtotalEl = document.getElementById("subtotal");
const totalEl = document.getElementById("total");
const cartCount = document.getElementById("cart-count");
const clearCartBtn = document.querySelector(".clear-cart");

// 🔥 Render cart
function renderCart() {

    container.innerHTML = "";
    let total = 0;

    if(cart.length === 0){
        document.getElementById("empty-msg").style.display = "block";
    } else {
        document.getElementById("empty-msg").style.display = "none";
    }

    cartCount.innerText = cart.length;

    cart.forEach((item, index) => {

        total += item.price * item.quantity;

        container.innerHTML += `
        <div class="cart-item">

            <div class="item-left">
                <img src="${item.image}">
                <div>
                    <b>${item.name}</b>
                </div>
            </div>

            <div class="qty-box">
                <button onclick="decreaseQty(${index})">-</button>
                <span>${item.quantity}</span>
                <button onclick="increaseQty(${index})">+</button>
            </div>

            <div class="item-price">₹${item.price}</div>

            <div class="remove-btn" onclick="removeItem(${index})">✖</div>

        </div>
        `;
    });

    subtotalEl.innerText = "₹" + total;
    totalEl.innerText = "₹" + total;
}

// ➕ Increase
function increaseQty(index){
    cart[index].quantity++;
    saveCart();
}

// ➖ Decrease
function decreaseQty(index){
    if(cart[index].quantity > 1){
        cart[index].quantity--;
    }
    saveCart();
}

// ❌ Remove
function removeItem(index){
    cart.splice(index,1);
    saveCart();
}

// 💾 Save
function saveCart(){
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
}

// 🧹 Clear Cart
clearCartBtn.addEventListener("click", () => {
    localStorage.removeItem("cart");
    cart = [];
    renderCart();
});

// Load
renderCart();

function updateCartCount(){
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    
    let count = 0;
    cart.forEach(item => {
        count += item.quantity;
    });

    document.getElementById("cart-count-nav").innerText = count;
}

updateCartCount();

function goToCheckout(){
    window.location.href = "checkout.html";
}

</script>

</body>
</html>
