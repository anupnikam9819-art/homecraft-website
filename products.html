<!DOCTYPE html>
<html>
<head>
    <title>Products - HomeCraft</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<div id="toast" class="toast">Item added to cart!</div>
<body>

<!-- Navbar -->
<header class="navbar">

    <div class="logo">
        <img src="images/logo.png" alt="logo">
        <span>HomeCraft</span>
    </div>

    <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="#">Categories</a>
        <a href="cart.html">Cart (<span id="cart-count-nav">0</span>)</a>
    </nav>

    <div class="login-panel">
        <a href="login.html">👤 Login</a>
    </div>

</header>

<h1>Our Products</h1>
<p style="text-align:center;">All DIY, Furnitures and Decor Products</p>

<div class="products">

    <div class="product-card">
        <img src="images/chair.jpg" width="200">
        <h3>Wooden Chair</h3>
        <p>₹2000</p>
        <button onclick="addToCart('Wooden Chair', ₹2000, 'images/chair.jpg')">
            Add to Cart
        </button>
        <button onclick="addToWishlist('Wooden Chair', ₹2000)">
            ❤️
        </button>
    </div>

    <div class="product-card">
        <img src="images/frame.jpg" width="200">
        <h3>Wall Frame Decor</h3>
        <p>₹800</p>
        <button onclick="addToCart('Wall Frame Decor', ₹800, 'images/frame.jpg')">
            Add to Cart
        </button>
        <button onclick="addToWishlist('Wall Frame Decor', ₹800)">
            ❤️
        </button>
    </div>

    <div class="product-card">
        <img src="images/shelf.jpg" width="200">
        <h3>DIY Shelf Kit</h3>
        <p>₹1500</p>
        <button onclick="addToCart('DIY Shelf Kit', ₹1500, 'images/shelf.jpg')">
            Add to Cart
        </button>
        <button onclick="addToWishlist('DIY Shelf Kit', ₹1500)">
            ❤️
        </button>
    </div>

</div>

<!-- ================= JAVASCRIPT ================= -->
<script>

function showToast(message){
    let toast = document.getElementById("toast");
    toast.innerText = message;
    toast.classList.add("show");

    setTimeout(() => {
        toast.classList.remove("show");
    }, 2000);
}

function addToCart(name, price, image){

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    let found = cart.find(item => item.name === name);

    if(found){
        found.quantity++;
    } else {
        cart.push({
            name: name,
            price: price,
            image: image,
            quantity: 1
        });
    }

    localStorage.setItem("cart", JSON.stringify(cart));

    updateCartCount();

    showToast(name + " added to cart ✅");
}


function updateCartCount(){
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    
    let count = 0;
    cart.forEach(item => {
        count += item.quantity;
    });

    document.getElementById("cart-count-nav").innerText = count;
}
    
    updateCartCount();
    
    function addToWishlist(name, price){
        let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
        let found = wishlist.find(item => item.name === name);
        if(!found){
            wishlist.push({name, price});
            localStorage.setItem("wishlist", JSON.stringify(wishlist));
            showToast(name + " added to wishlist ❤️");
        } else {
            showToast("Already in wishlist ❗");
    }
}
</script>

</body>
</html>
