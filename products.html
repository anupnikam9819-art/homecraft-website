<h1>Our Products</h1>

<div class="products">

    <div class="product-card" data-category="furniture">
        <img src="images/chair.jpg" width="200">
        <h3>Wooden Chair</h3>
        <p>₹2000</p>
        <button onclick="addToCart('Wooden Chair', 2000, 'images/chair.jpg')">
            Add to Cart
        </button>
        <button onclick="addToWishlist('Wooden Chair', 2000,'images/chair.jpg')">
            ❤️
        </button>
    </div>

    <div class="product-card" data-category="decor">
        <img src="images/frame.jpg" width="200">
        <h3>Wall Frame Decor</h3>
        <p>₹800</p>
        <button onclick="addToCart('Wall Frame Decor', 800, 'images/frame.jpg')">
            Add to Cart
        </button>
        <button onclick="addToWishlist('Wall Frame Decor', 800,'images/frame.jpg')">
            ❤️
        </button>
    </div>

    <div class="product-card" data-category="diy">
        <img src="images/shelf.jpg" width="200">
        <h3>DIY Shelf Kit</h3>
        <p>₹1500</p>
        <button onclick="addToCart('DIY Shelf Kit', 1500, 'images/shelf.jpg')">
            Add to Cart

        <button onclick="addToWishlist('DIY Shelf Kit', 1500,'images/shelf.jpg')">
            ❤️
        </button>
    </div>

</div>

<!-- ================= JAVASCRIPT ================= -->
<script>

function showToast(message){
    let toast = document.getElementById("toast");
    toast.innerText = message;
    toast.classList.add("show");

    setTimeout(() => {
        toast.classList.remove("show");
    }, 2000);
}

function addToCart(name, price, image){

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    let found = cart.find(item => item.name === name);

    if(found){
        found.quantity++;
    } else {
        cart.push({
            name: name,
            price: price,
            image: image,
            quantity: 1
        });
    }

    localStorage.setItem("cart", JSON.stringify(cart));

    updateCartCount();

    showToast(name + " added to cart ✅");
}

function updateCartCount(){
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    
    let count = 0;
    cart.forEach(item => {
        count += item.quantity;
    });

    document.getElementById("cart-count-nav").innerText = count;
}

updateCartCount();

// ✅ FIXED WISHLIST FUNCTION (ONLY ONE)
function addToWishlist(name, price, image){

    let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];

    let found = wishlist.find(item => item.name === name);

    if(!found){
        wishlist.push({
            name: name,
            price: price,
            image: image
        });

        localStorage.setItem("wishlist", JSON.stringify(wishlist));

        showToast(name + " added to wishlist ❤️");
    } else {
        showToast("Already in wishlist ❗");
    }
}

function searchProduct(){
    let input = document.getElementById("search").value.toLowerCase();
    let products = document.querySelectorAll(".product-card");

    products.forEach(product => {
        let name = product.querySelector("h3").innerText.toLowerCase();

        if(name.includes(input)){
            product.style.display = "block";
        } else {
            product.style.display = "none";
        }
    });
}

function filterCategory(category){

    let products = document.querySelectorAll(".product-card");

    products.forEach(product => {

        if(category === "all"){
            product.style.display = "block";
        } 
        else if(product.dataset.category === category){
            product.style.display = "block";
        } 
        else {
            product.style.display = "none";
        }

    });
}

</script>

</body>
