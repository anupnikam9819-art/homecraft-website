<!DOCTYPE html>
<html>
<head>
    <title>Products-HomeCraft</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<!-- Navbar -->
<header class="navbar">

    <div class="logo">
        <img src="images/logo.png" alt="logo">
        <span>HomeCraft</span>
    </div>

    <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="#">Categories</a>
        <a href="cart.html">Cart</a>
    </nav>

    <div class="login-panel">
        <a href="login.html">👤 Login</a>
    </div>

</header>
    <h1>Our Products</h1>
    <p>All DIY,Furnitures and Decor Products</p>
    <div class="products">
        <div class="product-card">
            <img src="images/chair.jpg" width="200">
            <h3>Wooden Chair</h3>
            <p>₹2000</p>
            <button onclick="addToCart('Wooden Chair', 2000)">Add to Cart</button>
        </div>
        <div class="product-card">
            <img src="images/frame.jpg" width="200">
            <h3>Wall Frame Decor</h3>
            <p>₹800</p>
            <button onclick="addToCart('Wall Frame Decor', 800)">Add to Cart</button>
        </div>
        <div class="product-card">
            <img src="images/shelf.jpg" width="200">
            <h3>DIY Shelf Kit</h3>
            <p>₹1500</p>
            <button onclick="addToCart('DIY Shelf Kit', 1500)">Add to Cart</button>
        </div>
    </div>
    <script>
    function addToCart(name, price)
    {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        
        cart.push({
            name: name,
            price: price,
            quantity: 1
        });
        
        localStorage.setItem("cart", JSON.stringify(cart));
        
        alert(name + " added to cart!");
}
</script>
</body>
</html>
